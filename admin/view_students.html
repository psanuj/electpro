<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Students — ElectPro Admin</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">⚡</div>
      <div class="brand-name">ElectPro</div>
      <div class="brand-sub">Admin Portal</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Menu</div>
      <a href="dashboard.html" class="nav-link"><span class="icon">🏠</span> Dashboard</a>
      <a href="manage_electives.html" class="nav-link"><span class="icon">📚</span> Manage Electives</a>
      <a href="view_students.html" class="nav-link active"><span class="icon">👥</span> View Students</a>
      <a href="view_preferences.html" class="nav-link"><span class="icon">📋</span> Preferences</a>
      <a href="allocation_results.html" class="nav-link"><span class="icon">🎯</span> Allocation Results</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="avatar" id="avatarInitials">??</div>
        <div>
          <div class="user-name" id="sidebarName">Loading...</div>
          <div class="user-role" id="sidebarMeta">Administrator</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="flex gap-3" style="align-items:center">
        <div class="hamburger" id="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></div>
        <h1 class="page-title">View Students</h1>
      </div>
      <div class="topbar-right">
        <span class="badge-pill badge-blue" id="student-count">Loading...</span>
        <button class="btn btn-danger btn-sm" onclick="handleLogout()">🚪 Logout</button>
      </div>
    </header>

    <main class="content">
      <div class="mb-6 fade-up fade-up-1">
        <div class="flex gap-3" style="flex-wrap:wrap;align-items:center">
          <input type="text" id="search-student" placeholder="🔍 Search students..." style="max-width:280px" oninput="filterStudents()" />
          <select id="branch-filter" onchange="filterStudents()" style="max-width:180px">
            <option value="">All Branches</option>
            <option value="CSE">CSE</option>
            <option value="ECE">ECE</option>
            <option value="MECH">MECH</option>
            <option value="CIVIL">CIVIL</option>
          </select>
        </div>
      </div>

      <div class="fade-up fade-up-2">
        <div class="flex-between mb-4">
          <h3 style="font-family:'Syne',sans-serif;font-size:16px;font-weight:700">Registered Students</h3>
          <span class="text-sm text-muted" id="showing-count">Loading...</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>USN</th>
                <th>Name</th>
                <th>Branch</th>
                <th>Semester</th>
                <th>Email</th>
                <th>CGPA</th>
                <th>Preferences</th>
              </tr>
            </thead>
            <tbody id="studentsTableBody">
              <tr><td colspan="7" style="text-align:center;padding:20px">Loading students...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast"><span class="toast-icon" id="toast-icon">✅</span><span id="toast-msg">Done!</span></div>

  <script src="../auth.js"></script>
  <script src="../script.js"></script>
  <script>
    let allStudents = [];

    (async () => {
      const session = await requireAuth('admin', '../login.html');
      if (!session) return;
      const initials = session.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('avatarInitials').textContent = initials;
      document.getElementById('sidebarName').textContent    = session.name;
      document.getElementById('sidebarMeta').textContent    = (session.designation || 'Admin') + ' — ' + (session.department || '');
      loadStudents();
    })();

    async function loadStudents() {
      const res    = await fetch('/api/auth/admin/students', { credentials: 'include' });
      const result = await res.json();
      if (!result.ok) { showToast('❌', result.msg); return; }
      allStudents = result.students;
      document.getElementById('student-count').textContent = allStudents.length + ' Registered';
      renderStudents(allStudents);
    }

    function renderStudents(students) {
      const tbody = document.getElementById('studentsTableBody');
      document.getElementById('showing-count').textContent = 'Showing ' + students.length + ' students';
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:20px">No students found</td></tr>';
        return;
      }
      tbody.innerHTML = students.map(s => {
        const prefs = s.preferences ? JSON.parse(s.preferences) : [];
        const prefStatus = prefs.length > 0
          ? '<span class="badge-pill badge-green">Submitted</span>'
          : '<span class="badge-pill badge-amber">Pending</span>';
        return `<tr>
          <td>${s.usn || '—'}</td>
          <td>${s.name}</td>
          <td>${s.branch || '—'}</td>
          <td>${s.semester || '—'}</td>
          <td>${s.email}</td>
          <td>${s.cgpa || '—'}</td>
          <td>${prefStatus}</td>
        </tr>`;
      }).join('');
    }

    function filterStudents() {
      const q      = document.getElementById('search-student').value.toLowerCase();
      const branch = document.getElementById('branch-filter').value;
      const filtered = allStudents.filter(s => {
        const matchSearch = !q || s.name.toLowerCase().includes(q) || (s.usn||'').toLowerCase().includes(q);
        const matchBranch = !branch || s.branch === branch;
        return matchSearch && matchBranch;
      });
      renderStudents(filtered);
    }

    async function handleLogout() {
      await logoutUser();
      window.location.href = '../login.html';
    }
  </script>
</body>
</html>
